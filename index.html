<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — FAST HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            color: #fff; 
            scroll-behavior: smooth;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            transition: 0.3s;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }
        .status-pill { padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .is-working { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .is-patched { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        input { background: #111; border: 1px solid #222; color: #fff; outline: none; }
        input:focus { border-color: #fff; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="font-black tracking-tighter text-xl">RETH</div>
        <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest text-zinc-400">
            <a href="#directory" class="hover:text-white">Executors</a>
            <a href="#scripts" class="hover:text-white">Scripts</a>
            <a href="#bypass" class="hover:text-white">Bypass</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter">AUTHENTICATE</h1>
        <p class="text-zinc-500 text-xs tracking-[0.3em] uppercase">Fastest Script & Executor Hub</p>
    </section>

    <section id="directory" class="max-w-6xl mx-auto px-6 py-20">
        <h2 class="text-3xl font-black mb-10 uppercase italic">Executors.</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-8 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Delta Core</h3>
                    <p class="text-zinc-500 text-[10px] uppercase">Mobile Executor</p>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <span class="status-pill is-working">WORKING</span>
                    <button class="bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase">Download</button>
                </div>
            </div>
            <div class="glass-card p-8 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Codex</h3>
                    <p class="text-zinc-500 text-[10px] uppercase">Stable Build</p>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <span class="status-pill is-working">WORKING</span>
                    <button class="bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase">Download</button>
                </div>
            </div>
        </div>
    </section>

    <section id="scripts" class="max-w-6xl mx-auto px-6 py-20 border-t border-white/5">
        <h2 class="text-3xl font-black mb-10 uppercase italic">Script Search.</h2>
        <div class="flex gap-4 mb-10">
            <input type="text" id="s-query" placeholder="Game Name..." class="flex-1 p-4 rounded-xl">
            <button onclick="doSearch()" class="bg-white text-black px-8 rounded-xl font-black uppercase text-xs">Search</button>
        </div>
        <div id="s-results" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <section id="bypass" class="max-w-xl mx-auto px-6 py-20 border-t border-white/5 text-center">
        <h2 class="text-3xl font-black mb-6 uppercase italic">Bypass.</h2>
        <input type="text" id="b-url" placeholder="Paste Link..." class="w-full p-4 rounded-xl mb-4">
        <button class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl font-bold uppercase text-[10px]">Execute Decryption</button>
    </section>

    <script>
        // ฟังก์ชันค้นหาสคริปต์แบบลดขั้นตอนเพื่อให้โหลดเร็วขึ้น
        async function doSearch() {
            const q = document.getElementById('s-query').value;
            const res = document.getElementById('s-results');
            if(!q) return;

            res.innerHTML = '<div class="col-span-full text-center py-10 opacity-50 uppercase text-[10px] tracking-widest">Fetching...</div>';

            try {
                const response = await fetch(`https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=9`);
                const data = await response.json();
                res.innerHTML = '';

                data.result.scripts.forEach(s => {
                    // แก้ไขเรื่องรูปไม่โหลด: ใช้รูปจาก URL ตรงๆ หรือ placeholder
                    const img = s.game && s.game.image ? `https://scriptblox.com${s.game.image}` : 'https://via.placeholder.com/150';
                    
                    res.innerHTML += `
                        <div class="glass-card p-4 flex flex-col gap-4">
                            <div class="relative rounded-xl overflow-hidden aspect-video bg-zinc-900">
                                <img src="${img}" class="w-full h-full object-cover opacity-70" loading="lazy">
                                <div class="absolute top-2 right-2 status-pill ${s.isPatched ? 'is-patched' : 'is-working'} text-[8px]">
                                    ${s.isPatched ? 'PATCH' : 'WORK'}
                                </div>
                            </div>
                            <div>
                                <h4 class="font-bold truncate text-sm">${s.title}</h4>
                                <p class="text-[9px] text-zinc-600 uppercase mt-1">${s.game.name}</p>
                            </div>
                            <button onclick="window.open('https://scriptblox.com/script/${s.slug}')" class="w-full bg-white/5 hover:bg-white/10 p-2 rounded-lg text-[9px] font-bold uppercase">View Script</button>
                        </div>
                    `;
                });
            } catch (e) {
                res.innerHTML = '<div class="col-span-full text-center text-red-500 py-10">ERROR: FAILED TO LOAD DATABASE</div>';
            }
        }
    </script>

</body>
</html>
