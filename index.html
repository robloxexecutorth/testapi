<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH BYPASS - READY TO USE</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #141414; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: white; color: black; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #000; border: 1px dashed #444; min-height: 40px; font-size: 13px; word-break: break-all; }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <h2>RETH BYPASS</h2>
    <p style="font-size: 12px; color: #888;">Key is already embedded (Bacon-dcf...)</p>
    
    <input type="text" id="targetUrl" placeholder="วางลิงก์ Linkvertise ที่นี่...">
    <button onclick="runBypass()">BYPASS NOW</button>

    <div id="result">ระบบพร้อมใช้งาน...</div>
</div>

<script>
async function runBypass() {
    const targetUrl = document.getElementById('targetUrl').value;
    const resultBox = document.getElementById('result');

    if (!targetUrl) {
        resultBox.innerText = "กรุณาวางลิงก์ก่อนครับ";
        return;
    }

    resultBox.innerText = "กำลังประมวลผล... (ผ่าน Proxy)";
    
    // ใส่ Key ให้แล้วในตัวแปรนี้
    const MY_KEY = 'Bacon-dcf735c27c3d4ce79990-1dec54ac95d70c14a2bd';
    
    // เพิ่ม Proxy เพื่อแก้ปัญหา CORS Error ที่คุณเจอ
    const PROXY_URL = 'https://corsproxy.io/?';
    const API_ENDPOINT = 'https://baconbypass.online/bypass';
    
    const finalUrl = `${PROXY_URL}${encodeURIComponent(`${API_ENDPOINT}?url=${targetUrl}&apikey=${MY_KEY}`)}`;

    try {
        const res = await fetch(finalUrl);
        const data = await res.json();

        if (data.status === 'success') {
            resultBox.innerHTML = `สำเร็จ!<br><a href="${data.result}" target="_blank" class="success">${data.result}</a>`;
        } else {
            resultBox.innerText = `ข้อผิดพลาด: ${data.message}`;
            resultBox.className = "error";
        }
    } catch (error) {
        resultBox.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ (ลองเปลี่ยนลิงก์หรือเช็ค Key อีกครั้ง)";
        resultBox.className = "error";
    }
}
</script>

</body>
</html>
