<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIPT SEARCH TEST — RETH LABORATORY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }
        .search-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }
        .copy-success {
            background: #22c55e !important;
            color: white !important;
        }
        /* Loading Animation */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-6xl mx-auto">
        <div class="mb-16">
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2">SCRIPTBLOX TEST LAB</h1>
            <p class="text-zinc-500 text-sm font-mono uppercase tracking-widest">Experimental Search Engine v2.0</p>
        </div>

        <div class="glass-card p-6 mb-12 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Type game name (e.g. Blox Fruits)..." 
                   class="search-input flex-1 rounded-2xl p-5 text-sm font-mono">
            <button onclick="performSearch()" id="searchBtn"
                    class="bg-white text-black px-10 py-5 rounded-2xl font-black text-xs uppercase hover:bg-zinc-200 transition">
                Search
            </button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 border-2 border-dashed border-zinc-900 rounded-3xl">
                <p class="text-zinc-700 font-mono text-xs uppercase tracking-[0.3em]">Waiting for uplink...</p>
            </div>
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('resultsGrid');
            const btn = document.getElementById('searchBtn');

            if (!query) return;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            grid.innerHTML = '<div class="col-span-full text-center py-20 font-mono text-xs animate-pulse">FETCHING DATABASE...</div>';

            try {
                // ดึงข้อมูลจาก API
                const response = await fetch(`https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}&max=12`);
                const data = await response.json();
                
                grid.innerHTML = '';

                if (data.result && data.result.scripts.length > 0) {
                    data.result.scripts.forEach(script => {
                        // จัดการรูปลิงก์
                        const thumb = script.game && script.game.image 
                            ? `https://scriptblox.com${script.game.image}` 
                            : 'https://via.placeholder.com/400x200/111/333?text=No+Preview';

                        const card = `
                            <div class="glass-card p-5 flex flex-col gap-4">
                                <div class="relative rounded-xl overflow-hidden aspect-video bg-zinc-900">
                                    <img src="${thumb}" class="w-full h-full object-cover opacity-60 hover:opacity-100 transition-opacity">
                                    <div class="absolute top-3 right-3 text-[8px] font-bold px-3 py-1 rounded-full ${script.isPatched ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-green-500/20 text-green-400 border border-green-500/30'}">
                                        ${script.isPatched ? 'PATCHED' : 'WORKING'}
                                    </div>
                                </div>
                                
                                <div>
                                    <h3 class="font-bold text-base truncate">${script.title}</h3>
                                    <p class="text-[10px] text-zinc-500 font-mono mt-1 uppercase">${script.game.name || 'Universal'}</p>
                                </div>

                                <div class="flex gap-2 mt-2">
                                    <button onclick="copyToClipboard('${encodeURIComponent(script.content)}', this)" 
                                            class="flex-1 bg-zinc-900 text-white border border-white/5 py-3 rounded-xl text-[9px] font-bold uppercase hover:bg-zinc-800 transition">
                                        Copy Code
                                    </button>
                                    <button onclick="window.open('https://scriptblox.com/script/${script.slug}', '_blank')"
                                            class="bg-white text-black px-5 py-3 rounded-xl text-[9px] font-bold uppercase hover:bg-zinc-200 transition">
                                        View
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-zinc-500 font-mono text-xs">NO RESULTS FOUND.</div>';
                }
            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-mono text-xs uppercase text-red-500">Error: Connection Refused</div>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Search';
            }
        }

        function copyToClipboard(encodedCode, btn) {
            const code = decodeURIComponent(encodedCode);
            if (!code || code === "undefined") {
                alert("This script doesn't have a direct loadstring.");
                return;
            }

            navigator.clipboard.writeText(code).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.classList.add('copy-success');
                
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.classList.remove('copy-success');
                }, 2000);
            });
        }

        // รองรับการกด Enter เพื่อค้นหา
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
