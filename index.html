<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH BYPASS TESTER</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #151515;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #ccc; }

        #result-box {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px dashed #555;
            min-height: 50px;
            word-break: break-all;
            color: #aaa;
            font-size: 14px;
        }

        .success { color: #00ff88; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <h1>RETH BYPASS</h1>
    
    <input type="text" id="apiKey" placeholder="Bacon-dcf735c27c3d4ce79990-1dec54ac95d70c14a2bd">
    
    <input type="text" id="targetUrl" placeholder="Paste linkvertise / key link here...">
    
    <button onclick="testBypass()">BYPASS NOW</button>

    <div id="result-box">
        Waiting for decryption request...
    </div>
</div>

<script>
async function testBypass() {
    const apiKey = document.getElementById('apiKey').value;
    const targetUrl = document.getElementById('targetUrl').value;
    const resultBox = document.getElementById('result-box');

    if (!apiKey || !targetUrl) {
        resultBox.innerText = "Error: กรุณาใส่ข้อมูลให้ครบ";
        resultBox.className = "error";
        return;
    }

    resultBox.innerText = "Processing...";
    resultBox.className = "";

    const API_URL = 'https://baconbypass.online/bypass';
    const params = new URLSearchParams({
        url: targetUrl,
        apikey: apiKey
    });

    try {
        const res = await fetch(`${API_URL}?${params.toString()}`);
        const data = await res.json();

        if (data.status === 'success') {
            resultBox.innerHTML = `<strong>Result:</strong> <br> <span class="success">${data.result}</span>`;
            console.log('Bypassed:', data.result);
        } else {
            resultBox.innerText = `Error: ${data.message || 'Something went wrong'}`;
            resultBox.className = "error";
        }
    } catch (error) {
        resultBox.innerText = "Network Error: ไม่สามารถเชื่อมต่อ API ได้ (ลองเช็ค CORS หรือ VPN)";
        resultBox.className = "error";
    }
}
</script>

</body>
</html>
