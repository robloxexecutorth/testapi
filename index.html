<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH SCRIPT LAB — TEST ENGINE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }
        .search-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #555;
            border-bottom-color: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* สไตล์ปุ่มตอนก๊อปปี้สำเร็จ */
        .btn-copied {
            background-color: #16a34a !important;
            border-color: #22c55e !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-6xl mx-auto">
        <div class="mb-16 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter mb-2 italic">SCRIPT LAB.</h1>
                <p class="text-zinc-600 text-[10px] font-mono uppercase tracking-[0.4em]">Experimental Image Proxy Enabled</p>
            </div>
            <a href="index.html" class="text-[10px] font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest border-b border-zinc-800 pb-1">Back to Hub</a>
        </div>

        <div class="glass-card p-6 mb-12 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Search Game (e.g. Blox Fruits, Pet Sim...)" 
                   class="search-input flex-1 rounded-2xl p-5 text-sm font-mono focus:ring-1 focus:ring-white/20">
            <button onclick="performSearch()" id="searchBtn"
                    class="bg-white text-black px-12 py-5 rounded-2xl font-black text-xs uppercase hover:bg-zinc-200 transition-all active:scale-95">
                Search
            </button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-32">
                <p class="text-zinc-800 font-mono text-[10px] uppercase tracking-[0.5em]">Input game title to decrypt database</p>
            </div>
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('resultsGrid');
            const btn = document.getElementById('searchBtn');

            if (!query) return;

            // Loading State
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            grid.innerHTML = '<div class="col-span-full text-center py-32 font-mono text-[10px] animate-pulse text-zinc-500 uppercase tracking-widest">Bypassing ScriptBlox Security...</div>';

            try {
                // ดึงข้อมูล API
                const response = await fetch(`https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}&max=12`);
                const data = await response.json();
                
                grid.innerHTML = '';

                if (data.result && data.result.scripts.length > 0) {
                    data.result.scripts.forEach((script, index) => {
                        
                        // --- [FIXED: IMAGE PROXY] ---
                        // ใช้ images.weserv.nl เพื่อแก้ปัญหารูปไม่ขึ้น (Hotlink Protection)
                        const rawImage = script.game && script.game.image ? script.game.image : '';
                        const proxiedThumb = rawImage 
                            ? `https://images.weserv.nl/?url=https://scriptblox.com${rawImage}&w=500&h=280&fit=cover&output=webp` 
                            : 'https://via.placeholder.com/500x280/0a0a0a/333?text=NO+IMAGE';

                        const card = `
                            <div class="glass-card p-5 flex flex-col gap-5 opacity-0 translate-y-4" id="card-${index}">
                                <div class="relative rounded-2xl overflow-hidden aspect-video bg-zinc-900 border border-white/5">
                                    <img src="${proxiedThumb}" class="w-full h-full object-cover opacity-60 hover:opacity-100 transition-opacity duration-700">
                                    
                                    <div class="absolute top-4 right-4 text-[8px] font-black px-3 py-1 rounded-lg tracking-tighter shadow-2xl ${script.isPatched ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-green-500/20 text-green-400 border border-green-500/30'}">
                                        ${script.isPatched ? 'PATCHED' : 'WORKING'}
                                    </div>
                                </div>
                                
                                <div class="px-1">
                                    <h3 class="font-bold text-sm truncate text-zinc-100">${script.title}</h3>
                                    <div class="flex items-center gap-2 mt-2">
                                        <div class="w-1 h-1 rounded-full bg-zinc-700"></div>
                                        <p class="text-[9px] text-zinc-500 font-mono uppercase tracking-tighter">${script.game.name || 'Universal'}</p>
                                    </div>
                                </div>

                                <div class="flex gap-3 mt-auto">
                                    <button onclick="copyToClipboard('${encodeURIComponent(script.content)}', this)" 
                                            class="flex-1 bg-zinc-900 text-zinc-300 border border-white/5 py-4 rounded-xl text-[9px] font-black uppercase hover:bg-zinc-800 hover:text-white transition-all duration-300 active:scale-95">
                                        Copy Code
                                    </button>
                                    <button onclick="window.open('https://scriptblox.com/script/${script.slug}', '_blank')"
                                            class="bg-white text-black px-6 py-4 rounded-xl text-[9px] font-black uppercase hover:bg-zinc-200 transition-all active:scale-95">
                                        View
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;

                        // Animation delay
                        setTimeout(() => {
                            const el = document.getElementById(`card-${index}`);
                            if(el) { el.style.opacity = "1"; el.style.transform = "translateY(0)"; el.style.transition = "all 0.6s ease"; }
                        }, index * 100);
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center py-32 text-zinc-700 font-mono text-[10px] uppercase">No scripts found for this sector.</div>';
                }
            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-center py-32 text-red-900 font-mono text-[10px] uppercase">API Error: Uplink Failed. Try again later.</div>';
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Search';
            }
        }

        // ระบบ Copy พร้อม Fallback สำหรับทุกเครื่อง
        function copyToClipboard(encodedCode, btn) {
            const code = decodeURIComponent(encodedCode);
            if (!code || code === "undefined" || code === "null") {
                alert("This script does not have a public loadstring.");
                return;
            }

            navigator.clipboard.writeText(code).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.classList.add('btn-copied');
                
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.classList.remove('btn-copied');
                }, 2000);
            }).catch(() => {
                // Fallback สำหรับเบราว์เซอร์เก่า
                const textArea = document.createElement("textarea");
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                btn.innerText = 'COPIED!';
                btn.classList.add('btn-copied');
                setTimeout(() => {
                    btn.innerText = 'Copy Code';
                    btn.classList.remove('btn-copied');
                }, 2000);
            });
        }

        // กด Enter เพื่อค้นหา
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
